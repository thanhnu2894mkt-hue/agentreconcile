name: CI

on:
  push:
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Generate sample data + run pipeline
        run: python run.py --sample
      - name: Check output exists
        run: test -f data/output/DOI_SOAT_ZION_SACOMBANK.xlsx
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: recon-report
          path: data/output/*.xlsx
